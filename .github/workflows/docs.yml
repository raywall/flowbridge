name: docs

on:
  workflow_run:
    workflows:
      - release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opcoes: gitpage ou studio
  PAGES_TARGET: studio

jobs:
  build:
    name: gerar pages
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: baixar codigo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: validar alvo do pages
        shell: bash
        run: |
          case "${PAGES_TARGET}" in
            gitpage|studio)
              echo "Publicando alvo: ${PAGES_TARGET}"
              ;;
            *)
              echo "::error::PAGES_TARGET deve ser 'gitpage' ou 'studio'. Valor atual: ${PAGES_TARGET}"
              exit 1
              ;;
          esac

      - name: configurar node
        if: env.PAGES_TARGET == 'gitpage'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/gitpage/package-lock.json

      - name: configurar github pages
        uses: actions/configure-pages@v5

      - name: definir url do docusaurus
        if: env.PAGES_TARGET == 'gitpage'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          repository_owner="${GITHUB_REPOSITORY%/*}"
          repository_name="${GITHUB_REPOSITORY#*/}"

          if [[ "${repository_name}" == *.github.io ]]; then
            site_url="https://${repository_name}"
            base_url="/"
          else
            site_url="https://${repository_owner}.github.io"
            base_url="/${repository_name}/"
          fi

          echo "DOCUSAURUS_URL=${site_url}" >> "$GITHUB_ENV"
          echo "DOCUSAURUS_BASE_URL=${base_url}" >> "$GITHUB_ENV"
          echo "DOCUSAURUS_ORGANIZATION_NAME=${repository_owner}" >> "$GITHUB_ENV"
          echo "DOCUSAURUS_PROJECT_NAME=${repository_name}" >> "$GITHUB_ENV"

          if latest_release_tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName 2>/dev/null)"; then
            flowbridge_ref="${latest_release_tag}"
          else
            flowbridge_ref="${GITHUB_SHA}"
          fi

          echo "FLOWBRIDGE_RELEASE_BASE_URL=https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@${flowbridge_ref}/app/shared" >> "$GITHUB_ENV"

      - name: instalar dependencias
        if: env.PAGES_TARGET == 'gitpage'
        working-directory: app/gitpage
        run: npm ci

      - name: gerar build
        if: env.PAGES_TARGET == 'gitpage'
        working-directory: app/gitpage
        run: npm run build

      - name: enviar artefato do pages - gitpage
        if: env.PAGES_TARGET == 'gitpage'
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/gitpage/build

      - name: enviar artefato do pages - studio
        if: env.PAGES_TARGET == 'studio'
        uses: actions/upload-pages-artifact@v3
        with:
          path: studio

  deploy:
    name: publicar pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: publicar no github pages
        id: deployment
        uses: actions/deploy-pages@v4
