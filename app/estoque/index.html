<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <title>Estoque</title>
  
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="http://localhost:4200/flowbridge.css?v=20260417-1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="icon" type="image/x-icon" href="./favicon.png">

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    window.mermaid = mermaid;
  </script>

  <script src="http://localhost:4200/aws-icons.js?v=20260417-1"></script>
  <script src="http://localhost:4200/flowbridge.js?v=20260417-1"></script>
</head>

<body>
  <main class="page">
    <header class="hero">
      <h1>Estoque</h1>
      <p>
        Este site publica o fluxo de estoque e referencia o fluxo de vendas.
      </p>
    </header>

    <section class="card">
      <h2>Visualização integrada</h2>
      <p>
        Passe o mouse sobre <strong>Localizar produto</strong> ou
        <strong>Reservar item</strong> para ver as anotações do fluxo.
      </p>
      <div id="viewer"></div>
    </section>

    <section class="card">
      <h2>Origem local deste site</h2>
      <p><strong>Site:</strong> http://localhost:4220</p>
      <p>
        <strong>Diagrama local:</strong>
        <code>/diagrams/estoque.mmd</code>
      </p>
    </section>
  </main>

  <script>
    async function bootstrap() {
      while (!window.mermaid || !window.Flowbridge) {
        await new Promise((resolve) => setTimeout(resolve, 50));
      }

      const viewer = new window.Flowbridge.Viewer({
        element: document.getElementById("viewer"),
        initialSrc: "http://localhost:4220/diagrams/estoque.mmd",
        height: 520,
        showDownloadButton: true,
        downloadLabel: "Download",
        enableZoom: true,
        showViewControls: true,
      });

      await viewer.start();
    }

    bootstrap();
  </script>
</body>

</html>
